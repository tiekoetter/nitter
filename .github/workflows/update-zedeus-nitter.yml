name: Update zedeus/nitter submodule

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write
  pull-requests: write
  statuses: write

concurrency:
  group: update-zedeus-nitter-submodule
  cancel-in-progress: false

jobs:
  update:
    name: Update submodule pointer
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Update zedeus/nitter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          branch="update/zedeus-nitter"

          git submodule sync -- zedeus/nitter
          git submodule update --init --remote -- zedeus/nitter

          if git diff --quiet --exit-code -- zedeus/nitter; then
            echo "zedeus/nitter is already up to date."
            exit 0
          fi

          short_sha="$(git -C zedeus/nitter rev-parse --short HEAD)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C "${branch}"
          git add zedeus/nitter
          git commit -m "Update zedeus/nitter submodule to ${short_sha}"
          pr_head_sha="$(git rev-parse HEAD)"
          git fetch origin "${branch}:refs/remotes/origin/${branch}" || true
          git push --force-with-lease origin "${branch}"

          title="Update zedeus/nitter submodule"
          body="Updates the zedeus/nitter submodule pointer to ${short_sha}."
          pr_number="$(gh pr list \
            --state open \
            --head "${branch}" \
            --base "${{ github.event.repository.default_branch }}" \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "${pr_number}" ]; then
            gh pr edit "${pr_number}" --title "${title}" --body "${body}"
          else
            gh pr create \
              --base "${{ github.event.repository.default_branch }}" \
              --head "${branch}" \
              --title "${title}" \
              --body "${body}"
          fi

          shopt -s nullglob
          patches=(patches/*.patch patches/*.diff)
          patch_status=success
          check_patch() {
            local patch="$1"
            local patch_path="../../${patch}"
            if grep -q '^ ' "${patch}"; then
              git -C zedeus/nitter apply --check "${patch_path}" 2>/dev/null ||
                git -C zedeus/nitter apply --3way --check "${patch_path}" 2>/dev/null ||
                git -C zedeus/nitter apply --unidiff-zero --check "${patch_path}"
            else
              git -C zedeus/nitter apply --unidiff-zero --check "${patch_path}"
            fi
          }

          if [ "${#patches[@]}" -eq 0 ]; then
            echo "No patches to check."
          else
            for patch in "${patches[@]}"; do
              echo "Checking ${patch}"
              if ! check_patch "${patch}"; then
                patch_status=failure
              fi
            done
          fi

          target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [ "${patch_status}" = success ]; then
            gh api "repos/${GITHUB_REPOSITORY}/statuses/${pr_head_sha}" \
              -f state=success \
              -f context="Patch integration" \
              -f description="Patches apply to the updated submodule." \
              -f target_url="${target_url}"
          else
            gh api "repos/${GITHUB_REPOSITORY}/statuses/${pr_head_sha}" \
              -f state=failure \
              -f context="Patch integration" \
              -f description="Patches need to be rebased for this submodule update." \
              -f target_url="${target_url}"
            exit 1
          fi
