name: Build and publish Docker image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Apply patches
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          patches=(patches/*.patch patches/*.diff)
          if [ "${#patches[@]}" -eq 0 ]; then
            echo "No patches to apply."
            exit 0
          fi

          for patch in "${patches[@]}"; do
            echo "Applying ${patch}"
            git -C zedeus/nitter apply --unidiff-zero --check "../../${patch}"
            git -C zedeus/nitter apply --unidiff-zero "../../${patch}"
          done

      - name: Extract build metadata
        id: build-meta
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "upstream-date=$(git -C zedeus/nitter show -s --format=%cd --date=format:%Y.%m.%d HEAD)"
            echo "upstream-hash=$(git -C zedeus/nitter rev-parse HEAD)"
            echo "fork-hash=${GITHUB_SHA}"
            echo "fork-repository=${GITHUB_REPOSITORY}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7
        with:
          context: zedeus/nitter
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NITTER_UPSTREAM_DATE=${{ steps.build-meta.outputs.upstream-date }}
            NITTER_UPSTREAM_HASH=${{ steps.build-meta.outputs.upstream-hash }}
            NITTER_FORK_HASH=${{ steps.build-meta.outputs.fork-hash }}
            NITTER_FORK_REPOSITORY=${{ steps.build-meta.outputs.fork-repository }}
